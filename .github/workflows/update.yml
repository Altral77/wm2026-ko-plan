name: Tägliches Update der Gruppendaten

on:
  schedule:
    - cron: '0 9 * * *'      # täglich 09:00 UTC (11:00 dt. Sommerzeit)
  workflow_dispatch: {}        # manuell auslösbar über den "Actions"-Tab

permissions:
  contents: write

concurrency:
  group: wm-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Ergebnisse holen und eintragen
        run: python update.py
      - name: Bei Änderung committen
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "wm2026-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-Update Gruppendaten ($(date -u +%Y-%m-%d))"
            git push
            echo "Aktualisiert und gepusht."
          else
            echo "Keine Änderung – nichts zu committen."
          fi
